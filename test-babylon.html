<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js Test</title>
    <style>
        body { margin: 0; padding: 0; background: #000; }
        canvas { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const engine = new BABYLON.Engine(canvas, true);
        const scene = new BABYLON.Scene(engine);
        
        // Camera
        const camera = new BABYLON.ArcRotateCamera('camera', 0, Math.PI / 3, 10, BABYLON.Vector3.Zero(), scene);
        camera.attachControls(canvas, true);
        
        // Light
        const light = new BABYLON.HemisphericLight('light', new BABYLON.Vector3(0, 1, 0), scene);
        
        // Create a simple sphere
        const sphere = BABYLON.MeshBuilder.CreateSphere('sphere', {diameter: 2}, scene);
        sphere.material = new BABYLON.StandardMaterial('mat', scene);
        sphere.material.diffuseColor = new BABYLON.Color3(0, 1, 1);
        
        // Render loop
        engine.runRenderLoop(() => {
            scene.render();
        });
        
        // Resize
        window.addEventListener('resize', () => {
            engine.resize();
        });
        
        console.log("Babylon test loaded");
    </script>
</body>
</html>
