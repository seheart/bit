<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit from TRON - Proper Three.js</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #001133, #000011);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* Grid effect background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: grid-pulse 4s ease-in-out infinite;
        }

        @keyframes grid-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.1; }
        }

        #bit-canvas {
            width: 300px !important;
            height: 300px !important;
            border-radius: 10px;
        }

        .bit-glow-neutral #bit-canvas {
            filter: drop-shadow(0 0 25px rgba(0, 221, 255, 0.9)) 
                    drop-shadow(0 0 35px rgba(0, 221, 255, 0.6));
        }

        .bit-glow-yes #bit-canvas {
            filter: drop-shadow(0 0 30px rgba(255, 255, 0, 1)) 
                    drop-shadow(0 0 40px rgba(255, 255, 0, 0.7));
        }

        .bit-glow-no #bit-canvas {
            filter: drop-shadow(0 0 35px rgba(255, 0, 0, 1)) 
                    drop-shadow(0 0 45px rgba(255, 0, 0, 0.8));
        }

        #status {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
            height: 30px;
            color: #00ffff;
        }

        .controls {
            margin-top: 40px;
        }

        button {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 12px 24px;
            margin: 0 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        button:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="container bit-glow-neutral">
        <canvas id="bit-canvas" width="300" height="300"></canvas>
        <div id="status"></div>
        
        <div class="controls">
            <button onclick="sayYes()">Ask Question</button>
            <button onclick="sayNo()">Challenge Bit</button>
            <button onclick="randomResponse()">Random</button>
            <button onclick="rapidResponse()">Excite</button>
        </div>
    </div>

    <audio id="yesSound" preload="auto">
        <source src="bit-yes.mp3" type="audio/mpeg">
    </audio>
    <audio id="noSound" preload="auto">
        <source src="bit-no.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        console.log("Starting Three.js implementation...");
        
        let scene, camera, renderer, bitMesh;
        let currentState = 'neutral';
        let rotationSpeed = 0.01;

        // Initialize Three.js
        function init3D() {
            console.log("Initializing Three.js...");
            
            const canvas = document.getElementById('bit-canvas');
            if (!canvas) {
                console.error("Canvas not found!");
                return;
            }
            
            if (!window.THREE) {
                console.error("Three.js not loaded!");
                return;
            }
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000011);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            camera.position.z = 5;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(300, 300);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Lighting
            setupLighting();
            
            // Create initial geometry
            createBitGeometry('neutral');
            
            // Animation loop
            animate();
            
            console.log("Three.js initialized successfully!");
        }
        
        function setupLighting() {
            // Ambient light
            const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambientLight);
            
            // Main directional light
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Fill light from opposite side
            const fillLight = new THREE.DirectionalLight(0x4080ff, 0.3);
            fillLight.position.set(-5, -5, -5);
            scene.add(fillLight);
            
            // Point light for rim lighting
            const pointLight = new THREE.PointLight(0x00ffff, 0.5, 100);
            pointLight.position.set(0, 0, 10);
            scene.add(pointLight);
        }
        
        function createBitGeometry(state) {
            console.log(`Creating ${state} geometry...`);
            
            // Remove existing mesh
            if (bitMesh) {
                scene.remove(bitMesh);
                bitMesh.geometry.dispose();
                bitMesh.material.dispose();
            }
            
            let geometry, material;
            
            switch(state) {
                case 'neutral':
                    // Authentic stellated icosahedron: base icosahedron + 20 triangular spike pyramids
                    geometry = createStellatedIcosahedronFromPaper();
                    material = new THREE.MeshPhongMaterial({
                        color: 0x00ccff,
                        emissive: 0x003366,
                        shininess: 150,
                        transparent: true,
                        opacity: 0.85,
                        flatShading: true
                    });
                    rotationSpeed = 0.008;
                    break;
                    
                case 'yes':
                    // Basic octahedron
                    geometry = new THREE.OctahedronGeometry(2.4, 0);
                    material = new THREE.MeshPhongMaterial({
                        color: 0xffdd00,
                        emissive: 0x554400,
                        shininess: 200,
                        transparent: true,
                        opacity: 0.9,
                        flatShading: true
                    });
                    rotationSpeed = 0.025;
                    break;
                    
                case 'no':
                    // Basic dodecahedron
                    geometry = new THREE.DodecahedronGeometry(1.8, 0);
                    material = new THREE.MeshPhongMaterial({
                        color: 0xff3300,
                        emissive: 0x551100,
                        shininess: 120,
                        transparent: true,
                        opacity: 0.85,
                        flatShading: true
                    });
                    rotationSpeed = 0.015;
                    break;
            }
            
            bitMesh = new THREE.Mesh(geometry, material);
            bitMesh.castShadow = true;
            bitMesh.receiveShadow = true;
            scene.add(bitMesh);
            
            // Apply glow effect to container
            const container = document.querySelector('.container');
            container.className = container.className.replace(/bit-glow-\w+/g, '');
            container.classList.add(`bit-glow-${state}`);
            
            currentState = state;
            console.log(`${state} geometry created successfully`);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (bitMesh) {
                const time = Date.now() * 0.001;
                
                // Base rotation
                bitMesh.rotation.x += rotationSpeed;
                bitMesh.rotation.y += rotationSpeed * 1.5;
                
                // Gentle floating
                bitMesh.position.y = Math.sin(time) * 0.2;
                
                // Simple rotation only
                // Complex vertex animation breaks the geometry
            }
            
            renderer.render(scene, camera);
        }
        
        function createStellatedIcosahedronFromPaper() {
            // Basic icosahedron - complex vertex morphing breaks WebGL
            return new THREE.IcosahedronGeometry(1.8, 0);
        }
        
        // Response functions
        function sayYes() {
            createBitGeometry('yes');
            document.getElementById('status').textContent = 'YES!';
            document.getElementById('status').style.color = '#ffff00';
            
            const yesAudio = document.getElementById('yesSound');
            yesAudio.currentTime = 0;
            yesAudio.play().catch(() => {
                console.log('Audio play failed');
            });
            
            setTimeout(() => {
                createBitGeometry('neutral');
                document.getElementById('status').textContent = '';
            }, 1500);
        }

        function sayNo() {
            createBitGeometry('no');
            document.getElementById('status').textContent = 'NO!';
            document.getElementById('status').style.color = '#ff0000';
            
            const noAudio = document.getElementById('noSound');
            noAudio.currentTime = 0;
            noAudio.play().catch(() => {
                console.log('Audio play failed');
            });
            
            setTimeout(() => {
                createBitGeometry('neutral');
                document.getElementById('status').textContent = '';
            }, 1500);
        }

        function randomResponse() {
            if (Math.random() > 0.5) {
                sayYes();
            } else {
                sayNo();
            }
        }

        function rapidResponse() {
            const responses = Math.random() > 0.5;
            let count = 0;
            const maxCount = 5;
            
            const timer = setInterval(() => {
                if (responses) {
                    createBitGeometry('yes');
                    document.getElementById('status').textContent = 'YES! '.repeat(count + 1);
                    document.getElementById('status').style.color = '#ffff00';
                } else {
                    createBitGeometry('no');
                    document.getElementById('status').textContent = 'NO! '.repeat(count + 1);
                    document.getElementById('status').style.color = '#ff0000';
                }
                
                count++;
                if (count >= maxCount) {
                    clearInterval(timer);
                    setTimeout(() => {
                        createBitGeometry('neutral');
                        document.getElementById('status').textContent = '';
                    }, 1500);
                }
            }, 400);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'y' || e.key === 'Y') sayYes();
            if (e.key === 'n' || e.key === 'N') sayNo();
            if (e.key === ' ') randomResponse();
            if (e.key === 'e' || e.key === 'E') rapidResponse();
        });

        // Click to interact
        document.getElementById('bit-canvas').addEventListener('click', randomResponse);
        
        // Initialize when page loads
        window.addEventListener('load', () => {
            console.log("Page loaded, initializing...");
            init3D();
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            if (renderer) {
                renderer.setSize(300, 300);
            }
        });
    </script>
</body>
</html>
