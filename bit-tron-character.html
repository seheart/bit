<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit from TRON - Interactive Character</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #001133, #000011);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* Grid effect background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: grid-pulse 4s ease-in-out infinite;
        }

        @keyframes grid-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.1; }
        }

        #bit {
            width: 200px;
            height: 200px;
            margin: 50px auto;
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.3s ease;
            perspective: 600px;
        }

        #bit:hover {
            transform: scale(1.1);
        }

        /* Neutral state - polyhedron */
        .polyhedron {
            width: 100%;
            height: 100%;
            position: absolute;
            animation: float 3s ease-in-out infinite, rotate 8s linear infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes rotate {
            0% { transform: rotateX(0) rotateY(0) rotateZ(0); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        /* 3D Polyhedron Container */
        .shape {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* True 3D Polyhedral Faces - Triangular for accuracy */
        .polyhedron-face {
            position: absolute;
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, rgba(0, 255, 255, 0.9), rgba(0, 200, 200, 0.5));
            border: 1px solid rgba(0, 255, 255, 0.8);
            transform-origin: center center;
            transform-style: preserve-3d;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            box-shadow: 
                inset 0 0 15px rgba(0, 255, 255, 0.7),
                0 0 15px rgba(0, 255, 255, 0.5);
        }

        /* Add 3D depth with pseudo-elements */
        .polyhedron-face::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(0, 150, 150, 0.1));
            border: 2px solid rgba(0, 255, 255, 0.5);
            transform: translateZ(-10px);
            z-index: -1;
        }

        .polyhedron-face::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(0, 255, 255, 1), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            filter: blur(2px);
        }

        /* Neutral state - True 3D Icosahedron */
        .neutral {
            animation: pulse-neutral 2s ease-in-out infinite;
        }

        .neutral .polyhedron-face {
            border-bottom-color: rgba(0, 255, 255, 0.8);
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.8));
        }

        /* 20 Icosahedron faces - mathematically correct regular icosahedron */
        /* Top pentagonal pyramid (5 faces) */
        .neutral .face-1 { transform: rotateX(-26.57deg) rotateY(0deg) translateZ(65px); }
        .neutral .face-2 { transform: rotateX(-26.57deg) rotateY(72deg) translateZ(65px); }
        .neutral .face-3 { transform: rotateX(-26.57deg) rotateY(144deg) translateZ(65px); }
        .neutral .face-4 { transform: rotateX(-26.57deg) rotateY(216deg) translateZ(65px); }
        .neutral .face-5 { transform: rotateX(-26.57deg) rotateY(288deg) translateZ(65px); }
        
        /* Upper belt (5 faces) - connecting top to middle */
        .neutral .face-6 { transform: rotateX(10.81deg) rotateY(36deg) translateZ(65px); }
        .neutral .face-7 { transform: rotateX(10.81deg) rotateY(108deg) translateZ(65px); }
        .neutral .face-8 { transform: rotateX(10.81deg) rotateY(180deg) translateZ(65px); }
        .neutral .face-9 { transform: rotateX(10.81deg) rotateY(252deg) translateZ(65px); }
        .neutral .face-10 { transform: rotateX(10.81deg) rotateY(324deg) translateZ(65px); }
        
        /* Lower belt (5 faces) - connecting middle to bottom */
        .neutral .face-11 { transform: rotateX(-10.81deg) rotateY(0deg) translateZ(65px) rotateZ(180deg); }
        .neutral .face-12 { transform: rotateX(-10.81deg) rotateY(72deg) translateZ(65px) rotateZ(180deg); }
        .neutral .face-13 { transform: rotateX(-10.81deg) rotateY(144deg) translateZ(65px) rotateZ(180deg); }
        .neutral .face-14 { transform: rotateX(-10.81deg) rotateY(216deg) translateZ(65px) rotateZ(180deg); }
        .neutral .face-15 { transform: rotateX(-10.81deg) rotateY(288deg) translateZ(65px) rotateZ(180deg); }
        
        /* Bottom pentagonal pyramid (5 faces) */
        .neutral .face-16 { transform: rotateX(26.57deg) rotateY(36deg) translateZ(65px) rotateZ(180deg); }
        .neutral .face-17 { transform: rotateX(26.57deg) rotateY(108deg) translateZ(65px) rotateZ(180deg); }
        .neutral .face-18 { transform: rotateX(26.57deg) rotateY(180deg) translateZ(65px) rotateZ(180deg); }
        .neutral .face-19 { transform: rotateX(26.57deg) rotateY(252deg) translateZ(65px) rotateZ(180deg); }
        .neutral .face-20 { transform: rotateX(26.57deg) rotateY(324deg) translateZ(65px) rotateZ(180deg); }

        @keyframes pulse-neutral {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.8));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 35px rgba(0, 255, 255, 1));
                transform: scale(1.05);
            }
        }

        /* Yes state - Octahedron (8 triangular faces) */
        .yes {
            animation: pulse-yes 0.5s ease-out;
            transform: scale(1.2);
        }

        .yes .polyhedron-face {
            background: linear-gradient(45deg, rgba(255, 255, 0, 0.9), rgba(255, 200, 0, 0.6));
            border: 1px solid rgba(255, 255, 0, 0.9);
            box-shadow: 
                inset 0 0 15px rgba(255, 255, 0, 0.7),
                0 0 20px rgba(255, 255, 0, 0.8);
            filter: drop-shadow(0 0 20px rgba(255, 255, 0, 1));
        }

        /* Regular Octahedron 8 faces - mathematically correct */
        .yes .face-1 { transform: rotateY(0deg) rotateX(54.74deg) translateZ(45px); }
        .yes .face-2 { transform: rotateY(90deg) rotateX(54.74deg) translateZ(45px); }
        .yes .face-3 { transform: rotateY(180deg) rotateX(54.74deg) translateZ(45px); }
        .yes .face-4 { transform: rotateY(270deg) rotateX(54.74deg) translateZ(45px); }
        .yes .face-5 { transform: rotateY(0deg) rotateX(-54.74deg) translateZ(45px); }
        .yes .face-6 { transform: rotateY(90deg) rotateX(-54.74deg) translateZ(45px); }
        .yes .face-7 { transform: rotateY(180deg) rotateX(-54.74deg) translateZ(45px); }
        .yes .face-8 { transform: rotateY(270deg) rotateX(-54.74deg) translateZ(45px); }

        @keyframes pulse-yes {
            0% { transform: scale(1) rotateY(0deg); }
            50% { transform: scale(1.5) rotateY(180deg); }
            100% { transform: scale(1.2) rotateY(360deg); }
        }

        /* No state - Stellated Icosahedron (spiky red) */
        .no {
            animation: pulse-no 0.5s ease-out;
            transform: scale(1.3);
        }

        .no .polyhedron-face {
            background: linear-gradient(45deg, rgba(255, 0, 0, 0.95), rgba(200, 0, 0, 0.7));
            border: 1px solid rgba(255, 0, 0, 0.9);
            width: 30px;
            height: 60px; /* Longer spiky triangles */
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            box-shadow: 
                inset 0 0 10px rgba(255, 0, 0, 0.8),
                0 0 25px rgba(255, 0, 0, 0.9);
            filter: drop-shadow(0 0 25px rgba(255, 0, 0, 1));
        }

        /* Compound of tetrahedra - spiky projections in multiple directions */
        /* Primary tetrahedral vertices */
        .no .face-1 { transform: rotateX(70.5deg) rotateY(0deg) translateZ(80px); }
        .no .face-2 { transform: rotateX(70.5deg) rotateY(120deg) translateZ(80px); }
        .no .face-3 { transform: rotateX(70.5deg) rotateY(240deg) translateZ(80px); }
        .no .face-4 { transform: rotateX(-70.5deg) rotateY(60deg) translateZ(80px); }
        
        /* Secondary tetrahedral vertices */
        .no .face-5 { transform: rotateX(-70.5deg) rotateY(180deg) translateZ(80px); }
        .no .face-6 { transform: rotateX(-70.5deg) rotateY(300deg) translateZ(80px); }
        .no .face-7 { transform: rotateX(35.26deg) rotateY(45deg) translateZ(75px); }
        .no .face-8 { transform: rotateX(35.26deg) rotateY(165deg) translateZ(75px); }
        
        /* Additional spiky projections */
        .no .face-9 { transform: rotateX(35.26deg) rotateY(285deg) translateZ(75px); }
        .no .face-10 { transform: rotateX(-35.26deg) rotateY(15deg) translateZ(75px); }
        .no .face-11 { transform: rotateX(-35.26deg) rotateY(135deg) translateZ(75px); }
        .no .face-12 { transform: rotateX(-35.26deg) rotateY(255deg) translateZ(75px); }
        
        /* Equatorial spikes */
        .no .face-13 { transform: rotateY(0deg) translateZ(70px); }
        .no .face-14 { transform: rotateY(90deg) translateZ(70px); }
        .no .face-15 { transform: rotateY(180deg) translateZ(70px); }
        .no .face-16 { transform: rotateY(270deg) translateZ(70px); }
        
        /* Top and bottom spikes */
        .no .face-17 { transform: rotateX(90deg) translateZ(85px); }
        .no .face-18 { transform: rotateX(-90deg) translateZ(85px); }
        .no .face-19 { transform: rotateX(45deg) rotateY(45deg) translateZ(72px); }
        .no .face-20 { transform: rotateX(-45deg) rotateY(225deg) translateZ(72px); }

        @keyframes pulse-no {
            0% { transform: scale(1) rotateY(0deg); }
            25% { transform: scale(1.4) rotateY(-90deg); }
            50% { transform: scale(1.2) rotateY(90deg); }
            75% { transform: scale(1.4) rotateY(-90deg); }
            100% { transform: scale(1.3) rotateY(0deg); }
        }

        .controls {
            margin-top: 40px;
        }

        /* Zdog Canvas styling with TRON glow effects */
        #bit-canvas {
            width: 200px !important;
            height: 200px !important;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.8));
            transition: filter 0.3s ease;
        }

        /* Glow effects for different states */
        .bit-glow-neutral #bit-canvas {
            filter: drop-shadow(0 0 25px rgba(0, 221, 255, 0.9)) 
                    drop-shadow(0 0 35px rgba(0, 221, 255, 0.6))
                    drop-shadow(0 0 45px rgba(0, 221, 255, 0.3));
        }

        .bit-glow-yes #bit-canvas {
            filter: drop-shadow(0 0 30px rgba(255, 255, 0, 1)) 
                    drop-shadow(0 0 40px rgba(255, 255, 0, 0.7))
                    drop-shadow(0 0 50px rgba(255, 255, 0, 0.4));
        }

        .bit-glow-no #bit-canvas {
            filter: drop-shadow(0 0 35px rgba(255, 0, 0, 1)) 
                    drop-shadow(0 0 45px rgba(255, 0, 0, 0.8))
                    drop-shadow(0 0 55px rgba(255, 0, 0, 0.5));
        }

        button {
            background: linear-gradient(45deg, #0088ff, #00ffff);
            border: 2px solid #00ffff;
            color: white;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        button:hover {
            background: linear-gradient(45deg, #00ffff, #0088ff);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            transform: scale(1.05);
        }

        .status {
            color: #00ffff;
            font-size: 24px;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            min-height: 30px;
        }

        .instructions {
            color: #00ffff;
            margin-bottom: 20px;
            opacity: 0.8;
            font-size: 14px;
        }

        /* Particle effects */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            pointer-events: none;
            animation: particle-float 2s linear forwards;
        }

        @keyframes particle-float {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <h1 style="color: #00ffff; text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);">BIT</h1>
        <div class="instructions">Click Bit or use the buttons to interact</div>
        
        <div id="bit" onclick="randomResponse()">
            <div class="polyhedron">
                <canvas id="bit-canvas" width="200" height="200"></canvas>
            </div>
        </div>

        <div class="status" id="status"></div>

        <div class="controls">
            <button onclick="sayYes()">Ask a Question (Yes)</button>
            <button onclick="sayNo()">Ask a Question (No)</button>
            <button onclick="rapidResponse()">Excite Bit!</button>
        </div>
    </div>

    <!-- Audio elements for actual Bit sounds -->
    <audio id="noSound" preload="auto">
        <source src="bit-no.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="yesSound" preload="auto">
        <source src="bit-yes.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script>
        // Babylon.js setup for realistic 3D rendering
        let engine, scene, camera, bitMesh;
        let currentState = 'neutral';
        let rotationSpeed = 0.01;
        
        // Initialize Babylon.js with realistic materials and lighting
        async function init3D() {
            console.log("Initializing 3D engine...");
            const canvas = document.getElementById('bit-canvas');
            
            if (!canvas) {
                console.error("Canvas not found!");
                return;
            }
            
            if (!window.BABYLON) {
                console.error("Babylon.js not loaded!");
                return;
            }
            
            // Create Babylon.js engine and scene
            engine = new BABYLON.Engine(canvas, true, { 
                preserveDrawingBuffer: true, 
                stencil: true 
            });
            
            scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0, 0, 0);
            
            console.log("Engine and scene created successfully");
            
            // Create camera
            camera = new BABYLON.ArcRotateCamera("camera", 0, Math.PI / 3, 8, BABYLON.Vector3.Zero(), scene);
            camera.attachControls(canvas, false); // Disable user controls
            
            // Enhanced lighting setup for realistic 3D
            setupLighting();
            
            // Create initial icosahedron
            console.log("Creating initial geometry...");
            await createBitGeometry('neutral');
            
            // Animation loop
            console.log("Starting render loop...");
            engine.runRenderLoop(() => {
                animate();
                scene.render();
            });
            
            // Handle window resize
            window.addEventListener("resize", () => {
                engine.resize();
            });
        }
        
        function setupLighting() {
            // Enhanced crystalline lighting setup for solid 3D appearance
            
            // Strong hemispheric light for ambient lighting
            const hemisphericLight = new BABYLON.HemisphericLight("hemiLight", new BABYLON.Vector3(0, 1, 0), scene);
            hemisphericLight.intensity = 0.6;
            hemisphericLight.diffuse = new BABYLON.Color3(0.1, 0.2, 0.3); // Cool ambient
            
            // Primary directional light from top-right
            const directionalLight1 = new BABYLON.DirectionalLight("dirLight1", new BABYLON.Vector3(-1, -1, -1), scene);
            directionalLight1.intensity = 1.2;
            directionalLight1.position = new BABYLON.Vector3(20, 20, 20);
            directionalLight1.diffuse = new BABYLON.Color3(1, 1, 1);
            directionalLight1.specular = new BABYLON.Color3(1, 1, 1);
            
            // Secondary directional light from left for crystalline facets
            const directionalLight2 = new BABYLON.DirectionalLight("dirLight2", new BABYLON.Vector3(1, 0, -1), scene);
            directionalLight2.intensity = 0.8;
            directionalLight2.position = new BABYLON.Vector3(-15, 10, 15);
            directionalLight2.diffuse = new BABYLON.Color3(0.8, 0.9, 1);
            
            // Rim light from behind for crystal edge definition
            const directionalLight3 = new BABYLON.DirectionalLight("dirLight3", new BABYLON.Vector3(0, 1, 1), scene);
            directionalLight3.intensity = 0.6;
            directionalLight3.position = new BABYLON.Vector3(0, -15, -15);
            directionalLight3.diffuse = new BABYLON.Color3(0.2, 0.6, 1);
            
            // Enable shadows for primary light
            const shadowGenerator = new BABYLON.ShadowGenerator(2048, directionalLight1);
            shadowGenerator.usePercentageCloserFiltering = true;
            shadowGenerator.filteringQuality = BABYLON.ShadowGenerator.QUALITY_HIGH;
            
            // Point lights for multi-directional illumination
            const pointLight1 = new BABYLON.PointLight("pointLight1", new BABYLON.Vector3(3, 3, 3), scene);
            pointLight1.intensity = 0.8;
            pointLight1.diffuse = new BABYLON.Color3(1, 1, 1);
            pointLight1.specular = new BABYLON.Color3(1, 1, 1);
            
            const pointLight2 = new BABYLON.PointLight("pointLight2", new BABYLON.Vector3(-3, -2, 3), scene);
            pointLight2.intensity = 0.6;
            pointLight2.diffuse = new BABYLON.Color3(0.5, 0.8, 1);
        }
        
        async function createBitGeometry(state) {
            // Remove existing mesh
            if (bitMesh) {
                bitMesh.dispose();
            }
            
            // Apply glow effect to container
            const container = document.body;
            container.className = container.className.replace(/bit-glow-\w+/g, '');
            container.classList.add(`bit-glow-${state}`);
            
            let mesh, material;
            
            // Load actual OBJ files for authentic geometry
            const objFiles = {
                'neutral': 'tron_bit_neutral_icosahedron.obj',
                'yes': 'tron_bit_yes_octahedron.obj', 
                'no': 'tron_bit_no_compound_tetrahedra.obj'
            };
            
            // Use built-in geometry for now (OBJ files may be incomplete)
            switch(state) {
                case 'neutral':
                    mesh = BABYLON.MeshBuilder.CreateIcoSphere("icosahedron", {
                        radius: 1.5,
                        subdivisions: 0
                    }, scene);
                    break;
                case 'yes':
                    mesh = BABYLON.MeshBuilder.CreateOctahedron("octahedron", {
                        size: 2
                    }, scene);
                    break;
                case 'no':
                    mesh = createCompoundTetrahedra();
                    break;
            }
            
            // Create simple material for debugging
            material = new BABYLON.StandardMaterial(`${state}Material`, scene);
            
            switch(state) {
                case 'neutral':
                    material.diffuseColor = new BABYLON.Color3(0, 0.8, 1);
                    material.emissiveColor = new BABYLON.Color3(0, 0.2, 0.4);
                    rotationSpeed = 0.01;
                    break;
                    
                case 'yes':
                    material.diffuseColor = new BABYLON.Color3(1, 1, 0);
                    material.emissiveColor = new BABYLON.Color3(0.3, 0.3, 0);
                    rotationSpeed = 0.03;
                    break;
                    
                case 'no':
                    material.diffuseColor = new BABYLON.Color3(1, 0, 0);
                    material.emissiveColor = new BABYLON.Color3(0.3, 0, 0);
                    rotationSpeed = 0.02;
                    break;
            }
            
            console.log(`Created ${state} material and mesh`);
            
            mesh.material = material;
            
            // Enable shadows and enhanced lighting effects
            mesh.receiveShadows = true;
            
            // Add to shadow generators for casting shadows
            const shadowGenerator = scene.lights.find(light => light.name === 'dirLight1')?.getShadowGenerator();
            if (shadowGenerator) {
                shadowGenerator.addShadowCaster(mesh);
            }
            
            bitMesh = mesh;
            currentState = state;
        }
        
        // Create compound of tetrahedra for NO state
        function createCompoundTetrahedra() {
            const compound = new BABYLON.Mesh("compound", scene);
            
            // Create 5 tetrahedra in icosahedral symmetry
            const positions = [
                new BABYLON.Vector3(0, 2, 0),
                new BABYLON.Vector3(1.9, 0.6, 0), 
                new BABYLON.Vector3(1.2, -1.6, 0),
                new BABYLON.Vector3(-1.2, -1.6, 0),
                new BABYLON.Vector3(-1.9, 0.6, 0)
            ];
            
            positions.forEach((pos, i) => {
                const tetrahedron = BABYLON.MeshBuilder.CreatePolyhedron("tetra" + i, {
                    type: 0, // Tetrahedron
                    size: 0.8
                }, scene);
                
                tetrahedron.position = pos;
                tetrahedron.rotation.y = (i * Math.PI * 2) / 5;
                tetrahedron.parent = compound;
            });
            
            return compound;
        }

        function animate() {
            if (bitMesh) {
                // Smooth rotation
                bitMesh.rotation.x += rotationSpeed;
                bitMesh.rotation.y += rotationSpeed * 1.5;
                
                // Pulsing scale effect
                const pulse = Math.sin(Date.now() * 0.003) * 0.1 + 1;
                bitMesh.scaling = new BABYLON.Vector3(pulse, pulse, pulse);
            }
        }
        
        // Initialize on page load
        window.addEventListener('load', init3D);

        // Create audio context for sound generation (fallback)
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Play actual sound files with fallback
        function playYesSound() {
            const yesAudio = document.getElementById('yesSound');
            yesAudio.currentTime = 0;
            yesAudio.play().catch(() => {
                // Fallback to generated sound if file fails
                playGeneratedYesSound();
            });
        }
        
        function playNoSound() {
            const noAudio = document.getElementById('noSound');
            noAudio.currentTime = 0;
            noAudio.play().catch(() => {
                // Fallback to generated sound
                playGeneratedNoSound();
            });
        }
        
        // Generated sound fallbacks
        function playGeneratedYesSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }
        
        function playGeneratedNoSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.2);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.type = 'square';
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // Create particle effects
        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = color;
                particle.style.setProperty('--x', (Math.random() - 0.5) * 200 + 'px');
                particle.style.setProperty('--y', (Math.random() - 0.5) * 200 + 'px');
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 2000);
            }
        }

        async function sayYes() {
            const status = document.getElementById('status');
            
            await createBitGeometry('yes');
            status.textContent = 'YES!';
            status.style.color = '#ffff00';
            playYesSound();
            
            // Create yellow particles
            const bit = document.getElementById('bit');
            const rect = bit.getBoundingClientRect();
            createParticles(rect.left + rect.width/2, rect.top + rect.height/2, '#ffff00');
            
            setTimeout(async () => {
                await createBitGeometry('neutral');
                status.textContent = '';
            }, 1500);
        }

        async function sayNo() {
            const status = document.getElementById('status');
            
            await createBitGeometry('no');
            status.textContent = 'NO!';
            status.style.color = '#ff0000';
            playNoSound();
            
            // Create red particles
            const bit = document.getElementById('bit');
            const rect = bit.getBoundingClientRect();
            createParticles(rect.left + rect.width/2, rect.top + rect.height/2, '#ff0000');
            
            setTimeout(async () => {
                await createBitGeometry('neutral');
                status.textContent = '';
            }, 1500);
        }

        function randomResponse() {
            if (Math.random() > 0.5) {
                sayYes();
            } else {
                sayNo();
            }
        }

        function rapidResponse() {
            const responses = Math.random() > 0.5;
            let count = 0;
            const maxCount = 5; // Perfect excitement count
            
            // Both sounds are now same duration (0.52s), so uniform timing
            const baseDuration = 0.52; // Both YES and NO are now 0.52s
            const speedMultiplier = 1.33; // 33% faster playback
            const excitedDuration = baseDuration / speedMultiplier; // ~0.39s
            
            // Add buffer and convert to milliseconds
            const interval = (excitedDuration * 1000) + 50; // ~440ms for clean separation
            
            const timer = setInterval(() => {
                if (responses) {
                    sayYesExcited();
                    document.getElementById('status').textContent = 'YES! '.repeat(count + 1);
                } else {
                    sayNoExcited();
                    document.getElementById('status').textContent = 'NO! '.repeat(count + 1);
                }
                
                count++;
                if (count >= maxCount) {
                    clearInterval(timer);
                    setTimeout(async () => {
                        document.getElementById('status').textContent = '';
                        await createBitGeometry('neutral');
                    }, 1500);
                }
            }, interval); // Dynamic interval based on actual sped-up duration
        }
        
        // Excited versions with faster playback
        async function sayYesExcited() {
            const yesAudio = document.getElementById('yesSound');
            yesAudio.currentTime = 0;
            yesAudio.playbackRate = 1.33; // 33% faster
            yesAudio.play().catch(() => {
                playGeneratedYesSound();
            });
            
            // Visual effects
            const status = document.getElementById('status');
            
            await createBitGeometry('yes');
            status.style.color = '#ffff00';
            
            // Create particles
            const bit = document.getElementById('bit');
            const rect = bit.getBoundingClientRect();
            createParticles(rect.left + rect.width/2, rect.top + rect.height/2, '#ffff00');
            
            setTimeout(async () => {
                await createBitGeometry('neutral');
                yesAudio.playbackRate = 1.0; // Reset playback rate
            }, 600); // Shorter visual duration for excited mode
        }
        
        async function sayNoExcited() {
            const noAudio = document.getElementById('noSound');
            noAudio.currentTime = 0;
            noAudio.playbackRate = 1.33; // 33% faster
            noAudio.play().catch(() => {
                playGeneratedNoSound();
            });
            
            // Visual effects
            const status = document.getElementById('status');
            
            await createBitGeometry('no');
            status.style.color = '#ff0000';
            
            // Create particles
            const bit = document.getElementById('bit');
            const rect = bit.getBoundingClientRect();
            createParticles(rect.left + rect.width/2, rect.top + rect.height/2, '#ff0000');
            
            setTimeout(async () => {
                await createBitGeometry('neutral');
                noAudio.playbackRate = 1.0; // Reset playback rate
            }, 450); // Shorter visual duration for excited mode
        }

        // Add keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'y' || e.key === 'Y') sayYes();
            if (e.key === 'n' || e.key === 'N') sayNo();
            if (e.key === ' ') randomResponse();
            if (e.key === 'e' || e.key === 'E') rapidResponse();
        });

        // Initial animation
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('status').textContent = 'Ready to respond!';
                document.getElementById('status').style.color = '#00ffff';
                setTimeout(() => {
                    document.getElementById('status').textContent = '';
                }, 2000);
            }, 500);
        });
    </script>
</body>
</html>
